<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Home Control</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body class="p-4">

<h2 class="text-center">Smart Home Control</h2>

<div class="text-center mt-4">

    <h4>Living Room</h4>

    <button class="btn btn-primary m-2" data-device-id="living-light">Light</button>
    <button class="btn btn-primary m-2" data-device-id="living-fan">Fan</button>

    <hr>

    <h4>Bedroom</h4>

    <button class="btn btn-primary m-2" data-device-id="bedroom-light">Light</button>
    <button class="btn btn-primary m-2" data-device-id="bedroom-fan">Fan</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script src="script.js"></script>

</body>
</html>
